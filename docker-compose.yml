version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: restaurant_postgres
    restart: always
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: habiba
      POSTGRES_PASSWORD: habiba1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: restaurant_redis
    restart: always
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: restaurant_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: habiba@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
